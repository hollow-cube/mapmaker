name: Prod Build & Deploy
concurrency: Prod

on:
  push:
    tags: [ '\d+\.\d+\.\d+' ]

jobs:
  resource-pack-build:
    runs-on: ubuntu-latest
    outputs:
      resource_pack_sha: ${{ steps.process.outputs.resource_pack_sha }}
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build resource pack
        run: |
          ./gradlew :bin:packer:buildClient
          
          export RESOURCE_PACK_SHA=$(sha1sum build/client.zip | cut -d ' ' -f1)
          echo "resource_pack_sha=${RESOURCE_PACK_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resource Pack Hash: ${RESOURCE_PACK_SHA}" >> "$GITHUB_STEP_SUMMARY"

          mkdir -p out/resource-pack
          cp build/client.zip out/resource-pack/${RESOURCE_PACK_SHA}.zip
      - name: Upload resource pack
        uses: jakejarvis/s3-sync-action@master
        env:
          AWS_S3_ENDPOINT: https://bdb9cb2904188b760591dc1589a1ccf3.r2.cloudflarestorage.com
          AWS_S3_BUCKET: assets
          AWS_ACCESS_KEY_ID: ${{ env.R2_ASSETS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_ASSETS_SECRET_KEY }}
          AWS_S3_REGION: "auto"
          SOURCE_DIR: out

  docker-build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # Build server
      - name: Build standalone binary
        env:
          MAPMAKER_VERSION: ${{ github.ref_name }}
          MAPMAKER_COMMIT_HASH: ${{ github.sha }}
        run: ./gradlew :bin:map:shadowJar -PisRelease=true

      # Build and push docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: mworzala
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: "bin/map/deploy/Dockerfile"
          platforms: linux/amd64
          push: true
          tags: mworzala/mapmaker-map:${{ github.sha }}
  docker-build-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # Build server
      - name: Build standalone binary
        env:
          MAPMAKER_VERSION: ${{ github.ref_name }}
          MAPMAKER_COMMIT_HASH: ${{ github.sha }}
        run: ./gradlew :bin:hub:shadowJar -PisRelease=true

      # Build and push docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: mworzala
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: "bin/hub/deploy/Dockerfile"
          platforms: linux/amd64
          push: true
          tags: mworzala/mapmaker-hub:${{ github.sha }}
  docker-build-map-isolate:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # Build server
      - name: Build standalone binary
        env:
          MAPMAKER_VERSION: ${{ github.ref_name }}
          MAPMAKER_COMMIT_HASH: ${{ github.sha }}
        run: ./gradlew :bin:map-isolate:nativeCompile -PisRelease=true --no-configuration-cache

      # Build and push docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: mworzala
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: "bin/map-isolate/deploy/Dockerfile-native"
          platforms: linux/amd64
          push: true
          tags: mworzala/mapmaker-map-isolate:${{ github.sha }}

  helm-build:
    runs-on: ubuntu-latest
    steps:
      - name: Helm build
        uses: hollow-cube/actions/helm-build@main
        with:
          vault-token: ${{ secrets.VAULT_TOKEN }}
          name: mapmaker-node
  helm-build-map-isolate:
    runs-on: ubuntu-latest
    steps:
      - name: Helm build
        uses: hollow-cube/actions/helm-build@main
        with:
          vault-token: ${{ secrets.VAULT_TOKEN }}
          path: bin/map-isolate/deploy/helm-chart
          name: mapmaker-map-isolate

  helm-deploy-hub:
    name: Deploy Hub Server
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build-hub
      - helm-build
      - resource-pack-build
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - name: Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_KEY }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.74.0
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
      - uses: actions/checkout@v4

      # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
      - name: Import Server Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: prod/mapmaker
      # </ALERT>
      - name: Upgrade/install helm chart
        env:
          COMMIT_SHA: ${{ github.sha }}
          RESOURCE_PACK_HASH: ${{ needs.resource-pack-build.outputs.resource_pack_sha }}
        run: |
          # Setup Kubernetes
          tailscale configure kubeconfig prod-v2
          kubectl cluster-info

          # Deploy the chart
          helm registry login registry-1.docker.io --username mworzala --password ${{ env.DOCKER_PASS }}
          helm pull oci://registry-1.docker.io/mworzala/mapmaker-node --version "1.0.0-${{ github.sha }}"
          
          # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
          cat bin/hub/deploy/values-prod.yaml | envsubst > ./values-override-hub.yaml
          # </ALERT>
          
          helm upgrade mapmaker-hub mapmaker-node-1.0.0-${{ github.sha }}.tgz \
               --install --create-namespace --namespace mapmaker \
               --reset-values -f ./values-override-hub.yaml \
               --set image.tag="${{ github.sha }}" 

  helm-deploy-map:
    name: Deploy Map Server
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build-map
      - helm-build
      - resource-pack-build
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - name: Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_KEY }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.74.0
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
      - uses: actions/checkout@v4

      # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
      - name: Import Server Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: prod/mapmaker
      # </ALERT>
      - name: Upgrade/install helm chart
        env:
          COMMIT_SHA: ${{ github.sha }}
          RESOURCE_PACK_HASH: ${{ needs.resource-pack-build.outputs.resource_pack_sha }}
        run: |
          # Setup Kubernetes
          tailscale configure kubeconfig prod-v2
          kubectl cluster-info

          # Deploy the chart
          helm registry login registry-1.docker.io --username mworzala --password ${{ env.DOCKER_PASS }}
          helm pull oci://registry-1.docker.io/mworzala/mapmaker-node --version "1.0.0-${{ github.sha }}"
          
          # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
          cat bin/map/deploy/values-prod.yaml | envsubst > ./values-override-map.yaml
          # </ALERT>
          
          helm upgrade mapmaker-map mapmaker-node-1.0.0-${{ github.sha }}.tgz \
               --install --create-namespace --namespace mapmaker \
               --reset-values -f ./values-override-map.yaml \
               --set image.tag="${{ github.sha }}"
  helm-deploy-map-isolate:
    name: Deploy Map Server
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build-map-isolate
      - helm-build-map-isolate
      - resource-pack-build
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - name: Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_KEY }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.74.0
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
      - uses: actions/checkout@v4

      # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
      - name: Import Server Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: prod/map-isolate
      # </ALERT>
      - name: Upgrade/install helm chart
        env:
          COMMIT_SHA: ${{ github.sha }}
          RESOURCE_PACK_HASH: ${{ needs.resource-pack-build.outputs.resource_pack_sha }}
        run: |
          # Setup Kubernetes
          tailscale configure kubeconfig prod-v2
          kubectl cluster-info

          # Deploy the chart
          helm registry login registry-1.docker.io --username mworzala --password ${{ env.DOCKER_PASS }}
          helm pull oci://registry-1.docker.io/mworzala/mapmaker-map-isolate --version "1.0.0-${{ github.sha }}"
          
          # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
          cat bin/map-isolate/deploy/values-prod.yaml | envsubst > ./values-override-map.yaml
          # </ALERT>
          
          helm upgrade mapmaker-map-isolate mapmaker-map-isolate-1.0.0-${{ github.sha }}.tgz \
               --install --create-namespace --namespace mapmaker \
               --reset-values -f ./values-override-map.yaml \
               --set image.tag="${{ github.sha }}" 
