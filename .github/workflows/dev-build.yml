name: build-deploy

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://secrets.hollowcube.dev
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            global/data/docker user | DOCKER_USER ;
            global/data/docker pass | DOCKER_PASS
      - uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'gradle'
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@e6e38bacfdf1a337459f332974bb2327a31aaf4b
      - name: Build with Gradle
        uses: gradle/gradle-build-action@67421db6bd0bf253fb4bd25b31ebb98943c375e1
        with:
          arguments: :bin:development:shadowJar
        env:
          COMMIT_SHA: ${{ github.sha }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: registry.hollowcube.dev
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: "docker/Dockerfile"
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.hollowcube.dev/mapmaker-dev:${{ github.sha }}
  helm-build:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://secrets.hollowcube.dev
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            global/data/docker user | DOCKER_USER ;
            global/data/docker pass | DOCKER_PASS
      - uses: actions/checkout@v2
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Helm Chart
        run: |
          helm registry login registry.hollowcube.dev --username ${{ env.DOCKER_USER }} --password ${{ env.DOCKER_PASS }}
          helm package ./bin/development/deploy/mapmaker-dev --version "3.0.0-${{ github.sha }}" --app-version ${{ github.sha }}
          helm push mapmaker-dev-3.0.0-${{ github.sha }}.tgz oci://registry.hollowcube.dev/helm-charts
  helm-deploy:
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build
      - helm-build
    steps:
      - name: Import Secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://secrets.hollowcube.dev
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            global/data/docker user | DOCKER_USER ;
            global/data/docker pass | DOCKER_PASS ;
            global/data/kubernetes kubeconfig | KUBECONFIG_FILE
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add hollowcube repo
        run: |
          helm repo add hollowcube https://registry.hollowcube.dev --username ${{ env.DOCKER_USER }} --password ${{ env.DOCKER_PASS }}
      - name: Run upgrade
        run: |
          echo $KUBECONFIG_FILE > ./kubeconfig
          helm upgrade --install mapmaker-dev hollowcube/helm-charts/mapmaker-dev --version "3.0.0-${{ github.sha }}" --kubeconfig ./kubeconfig
