name: ci

on:
  push:
    branches:
      - "main"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'gradle'
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@e6e38bacfdf1a337459f332974bb2327a31aaf4b
      - name: Build with Gradle
        uses: gradle/gradle-build-action@67421db6bd0bf253fb4bd25b31ebb98943c375e1
        with:
          arguments: :bin:development:shadowJar
#      - uses: actions/upload-artifact@v3
#        with:
#          name: development-all.jar
#          path: ./bin/development/build/libs/development-all.jar
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: registry.hollowcube.net
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASS }}
#      - name: Download server artifact
#        uses: actions/download-artifact@v3
#        with:
#          name: development-all.jar
#          path: ./server.jar
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: "docker/Dockerfile"
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.hollowcube.net/mapmaker:latest
            registry.hollowcube.net/mapmaker:${{ github.sha }}
  helm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Helm Chart
        run: |
          helm package ./bin/development/deploy/mapmaker-dev --version "3.0.0-${{ github.sha }}" --app-version ${{ github.sha }}
          curl --data-binary "@mapmaker-dev-3.0.0-${{ github.sha }}.tgz" https://${{ secrets.HELM_REGISTRY_USER }}:${{ secrets.HELM_REGISTRY_PASS }}@helm.hollowcube.net/api/charts
#  helm-deploy:
#    runs-on: ubuntu-latest
#    needs:
#      - docker-build
#      - helm-build
