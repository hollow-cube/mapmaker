name: Staging Build & Deploy
concurrency: Staging

on:
  push:
    branches: [ main ]

jobs:
  resource-pack-build:
    runs-on: ubuntu-latest
    outputs:
      resource_pack_sha: ${{ steps.process.outputs.resource_pack_sha }}
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/resourcepacks3

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Cache Bazel
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-rp-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-rp-

      - name: Build resource pack
        run: |
          bazel build //:packer_development_client
          mkdir -p temp && unzip bazel-bin/client.zip -d temp
      - name: Squash resource pack
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest
          # Broken with java 22
          #            zip_spec_conformance_level = 'disregard'
          options: |
            pack_directory = 'temp'
            output_file_path = 'squashed.zip'
            downsize_if_single_color = false
      - name: Round 2
        id: process
        run: |
          export RESOURCE_PACK_SHA=$(sha1sum squashed.zip | cut -d ' ' -f1)
          echo "resource_pack_sha=${RESOURCE_PACK_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resource Pack Hash: ${RESOURCE_PACK_SHA}" >> "$GITHUB_STEP_SUMMARY"
          
          mkdir -p out
          cp squashed.zip out/mapmaker-${RESOURCE_PACK_SHA}.zip
      - name: Upload resource pack
        uses: jakejarvis/s3-sync-action@master
        env:
          AWS_S3_BUCKET: hollowcube-resource-pack
          AWS_ACCESS_KEY_ID: ${{ env.RP_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ env.RP_SECRET_KEY }}
          AWS_S3_REGION: "us-east-1"
          SOURCE_DIR: out

  docker-build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github

      - uses: actions/checkout@v3
      - name: Cache Bazel
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-map-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-map-

      # Build server
      - name: Build standalone binary
        run: bazel build //bin/map:map_deploy.jar --action_env=HOLLOWCUBE_STRIPPED_BINARY=true

      # Build and push docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: mworzala
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: bazel-bin/bin/map
          file: "bin/map/deploy/Dockerfile"
          platforms: linux/amd64
          push: true
          tags: mworzala/mapmaker-map:${{ github.sha }}
  docker-build-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github

      - uses: actions/checkout@v3
      - name: Cache Bazel
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-hub-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-hub-

      # Build server
      - name: Build standalone binary
        run: bazel build //bin/hub:hub_deploy.jar --action_env=HOLLOWCUBE_STRIPPED_BINARY=true

      # Build and push docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: mworzala
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: bazel-bin/bin/hub
          file: "bin/hub/deploy/Dockerfile"
          platforms: linux/amd64
          push: true
          tags: mworzala/mapmaker-hub:${{ github.sha }}

  helm-build:
    runs-on: ubuntu-latest
    steps:
      - name: Helm build
        uses: hollow-cube/actions/helm-build@main
        with:
          vault-token: ${{ secrets.VAULT_TOKEN }}
          name: mapmaker-node

  helm-deploy-hub:
    name: Deploy Hub Server
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build-hub
      - helm-build
      - resource-pack-build
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - name: Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_KEY }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.52.0
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
      - uses: actions/checkout@v3

      # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
      - name: Import Server Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: staging/mapmaker
      # </ALERT>
      - name: Upgrade/install helm chart
        env:
          COMMIT_SHA: ${{ github.sha }}
          RESOURCE_PACK_HASH: ${{ needs.resource-pack-build.outputs.resource_pack_sha }}
        run: |
          # Setup Kubernetes
          tailscale configure kubeconfig ovh-staging
          kubectl cluster-info

          # Deploy the chart
          helm registry login registry-1.docker.io --username mworzala --password ${{ env.DOCKER_PASS }}
          helm pull oci://registry-1.docker.io/mworzala/mapmaker-node --version "1.0.0-${{ github.sha }}"
          
          # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
          cat bin/hub/deploy/values-staging.yaml | envsubst > ./values-override-hub.yaml
          # </ALERT>
          
          helm upgrade mapmaker-hub mapmaker-node-1.0.0-${{ github.sha }}.tgz \
               --install --create-namespace --namespace mapmaker \
               --reset-values -f ./values-override-hub.yaml \
               --set image.tag="${{ github.sha }}" 

  helm-deploy-map:
    name: Deploy Map Server
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build-map
      - helm-build
      - resource-pack-build
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - name: Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_KEY }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.52.0
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
      - uses: actions/checkout@v3

      # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
      - name: Import Server Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: staging/mapmaker
      # </ALERT>
      - name: Upgrade/install helm chart
        env:
          COMMIT_SHA: ${{ github.sha }}
          RESOURCE_PACK_HASH: ${{ needs.resource-pack-build.outputs.resource_pack_sha }}
        run: |
          # Setup Kubernetes
          tailscale configure kubeconfig ovh-staging
          kubectl cluster-info

          # Deploy the chart
          helm registry login registry-1.docker.io --username mworzala --password ${{ env.DOCKER_PASS }}
          helm pull oci://registry-1.docker.io/mworzala/mapmaker-node --version "1.0.0-${{ github.sha }}"
          
          # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
          cat bin/map/deploy/values-staging.yaml | envsubst > ./values-override-map.yaml
          # </ALERT>
          
          helm upgrade mapmaker-map mapmaker-node-1.0.0-${{ github.sha }}.tgz \
               --install --create-namespace --namespace mapmaker \
               --reset-values -f ./values-override-map.yaml \
               --set image.tag="${{ github.sha }}" 
