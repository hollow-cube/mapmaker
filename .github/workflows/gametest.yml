name: gametest.yml
on:
  push:
    branches: [ main ]

jobs:
  gametest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'graalvm'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-xserver-utils
      - name: Build project
        run: ./gradlew :bin:packer:buildClient :tools:puppeteer:runGameTests
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: ./tools/puppeteer/build/run/clientGameTest/screenshots/
