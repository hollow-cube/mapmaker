name: map-isolate-working.yml
on:
  push:
    branches: [ main ]

jobs:
  docker-build-map-isolate:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github

      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'graalvm'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # Build server
      - name: Build standalone binary
        env:
          MAPMAKER_VERSION: ${{ github.ref_name }}
          MAPMAKER_COMMIT_HASH: ${{ github.sha }}
        run: ./gradlew :bin:map-isolate:nativeCompile -PisRelease=true --no-configuration-cache

      # Build and push docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: mworzala
          password: ${{ env.DOCKER_PASS }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: "bin/map-isolate/deploy/Dockerfile-native"
          platforms: linux/amd64
          push: true
          tags: mworzala/mapmaker-map-isolate:${{ github.sha }}
  helm-build-map-isolate:
    runs-on: ubuntu-latest
    steps:
      - name: Helm build
        uses: hollow-cube/actions/helm-build@main
        with:
          vault-token: ${{ secrets.VAULT_TOKEN }}
          path: bin/map-isolate/deploy/helm-chart
          name: mapmaker-map-isolate
  helm-deploy-map-isolate:
    name: Deploy Map Server
    runs-on: 'ubuntu-latest'
    needs:
      - docker-build-map-isolate
      - helm-build-map-isolate
    steps:
      - name: Import Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: global/github
      - name: Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_KEY }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.74.0
      - uses: azure/setup-helm@v3
        with:
          version: v3.10.2
      - uses: actions/checkout@v3

      # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
      - name: Import Server Secrets
        uses: hollow-cube/actions/secrets@main
        with:
          token: ${{ secrets.VAULT_TOKEN }}
          path: prod/mapmaker
      # </ALERT>
      - name: Upgrade/install helm chart
        env:
          COMMIT_SHA: ${{ github.sha }}
          RESOURCE_PACK_HASH: "TEMP_VALUE"
          # RESOURCE_PACK_HASH: ${{ needs.resource-pack-build.outputs.resource_pack_sha }}
        run: |
          # Setup Kubernetes
          tailscale configure kubeconfig prod-v2
          kubectl cluster-info

          # Deploy the chart
          helm registry login registry-1.docker.io --username mworzala --password ${{ env.DOCKER_PASS }}
          helm pull oci://registry-1.docker.io/mworzala/mapmaker-map-isolate --version "1.0.0-${{ github.sha }}"
          
          # <ALERT BEEP BOOP DIFFERENT FROM COMMON ACTION>
          cat bin/map-isolate/deploy/values-prod.yaml | envsubst > ./values-override-map.yaml
          # </ALERT>
          
          helm upgrade mapmaker-map-isolate mapmaker-node-1.0.0-${{ github.sha }}.tgz \
               --install --create-namespace --namespace mapmaker \
               --reset-values -f ./values-override-map.yaml \
               --set image.tag="${{ github.sha }}" 
