admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: public
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local
                  virtual_hosts:
                    - name: api
                      domains: [ "*" ]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: api_server_http
                            timeout: 0s
                      typed_per_filter_config:
                        envoy.filters.http.cors:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                          allow_origin_string_match:
                            - exact: "http://localhost:5173"
                          allow_methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
                          allow_headers: "Content-Type, Authorization, DPoP"
                          allow_credentials: true
                          max_age: "86400"
                http_filters:
                  # CORS runs first so browser preflight (OPTIONS) is answered
                  # at the edge and short-circuits before ext_authz — preflight
                  # carries no Authorization/DPoP and must not be auth-gated.
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  # Mirrors the prod Istio/Envoy ext_authz: every request is
                  # checked by api-server's gRPC Authorization service before it
                  # reaches the upstream. Fails closed.
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      failure_mode_allow: false
                      grpc_service:
                        envoy_grpc:
                          cluster_name: api_server_authz
                        timeout: 2s
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: api_server_http
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: api_server_http
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api-server, port_value: 9124 }

    - name: api_server_authz
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # gRPC requires HTTP/2 to the auth service.
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: { }
      load_assignment:
        cluster_name: api_server_authz
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api-server, port_value: 9001 }
