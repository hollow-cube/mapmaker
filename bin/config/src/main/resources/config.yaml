http:
  host: 0.0.0.0
  port: 9124

minestom:
  host: 0.0.0.0
  port: 25565
  # Translation mode: server,proxy
  translation: server

velocity:
  secret: ""

kafka:
  bootstrap_servers: localhost:9092

unleash:
  enabled: false
  address: ""
  token: ""

announcements:
  interval: 1800
  messages:
    - key: "announcement.test1"
    - key: "announcement.test2"
    - key: "announcement.test3"
    - key: "announcement.test4"
    - key: "announcement.filter.type"
      filters:
        session_type: "mapmaker:map"
    - key: "announcement.filter.type_and_state"
      filters:
        session_type: "mapmaker:map"
        session_state: "editing"
