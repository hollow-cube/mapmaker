version: "3.0"

networks:
  mapmaker:
    driver: bridge

services:
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - ../build/local/mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: test
    networks:
      - mapmaker
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../build/local/minio:/data
    environment:
      MINIO_ROOT_USER: mapmaker
      MINIO_ROOT_PASSWORD: mapmaker
    command: server --console-address ":9001" /data
