version: "3.0"

networks:
  mapmaker:
    driver: bridge

services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../../build/local/minio:/data
    environment:
      MINIO_ROOT_USER: mapmaker
      MINIO_ROOT_PASSWORD: mapmaker
    command: server --console-address ":9001" /data
    networks:
      - mapmaker
  spicedb:
    image: "authzed/spicedb"
    command: "serve"
    restart: "always"
    ports:
      - "8080:8080"
      - "9090:9090"
      - "50051:50051"
    environment:
      - "SPICEDB_GRPC_PRESHARED_KEY=foobar"
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://mapmaker:mapmaker@postgres:5432/spicedb?sslmode=disable"
    depends_on:
      - "migrate"
    networks:
      - mapmaker
  migrate:
    image: "authzed/spicedb"
    command: "migrate head"
    restart: "on-failure"
    environment:
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://mapmaker:mapmaker@postgres:5432/spicedb?sslmode=disable"
    depends_on:
      - "postgres"
    networks:
      - mapmaker
  postgres:
    image: "postgres:15"
    ports:
      - "5432:5432"
    environment:
      - "POSTGRES_USER=mapmaker"
      - "POSTGRES_PASSWORD=mapmaker"
      - "POSTGRES_DB=spicedb"
    networks:
      - mapmaker
  cache:
    image: redis:7.2-rc2-alpine
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
