apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "map-isolate.fullname" . }}-image-prepull"
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: prepull
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: [ './map-isolate', 'noop' ]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
            seccompProfile:
              type: RuntimeDefault
      restartPolicy: Never
