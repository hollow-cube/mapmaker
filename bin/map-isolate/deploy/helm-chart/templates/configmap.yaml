apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "map-isolate.labels" . | nindent 4 }}
data:
  {{ .Release.Name }}-image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  {{ .Release.Name }}-config.yaml: |
    # Map Isolate Configuration
    # This file is generated by the Helm chart and should not be modified directly.
    image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
    env:
      MAPMAKER_RESOURCE_PACK_HASH: {{ .Values.mapmaker.resourcePackHash }}
