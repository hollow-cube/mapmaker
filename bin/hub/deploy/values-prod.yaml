fullnameOverride: mapmaker-hub

mapmaker:
  role: hub

  terminationSeconds: 22600

image:
  prefix: "mworzala/mapmaker-"
  pullSecrets:
    - name: dockerio

resources:
  limits:
    #    cpu: 1000m
    memory: 1500Mi
  requests:
    #    cpu: 500m
    memory: 1500Mi

serviceMonitor:
  enabled: true

env:
  MAPMAKER_INSTANCE_SIZE: "hub"
  MAPMAKER_COMMIT_SHA: "$COMMIT_SHA"
  MAPMAKER_RESOURCE_PACK_HASH: "$RESOURCE_PACK_HASH"
  MAPMAKER_SHUTDOWN_MAX_WAIT_MILLIS: "21600000" # 6 hours

  MAPMAKER_METRICS_PASSWORD: "${METRICS_PASSWORD}"
  MAPMAKER_METRICS_PYROSCOPE_ENDPOINT: "http://pyroscope.monitoring.svc.cluster.local:4040"
  MAPMAKER_TRACING_OTLP_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"

  MAPMAKER_VELOCITY_SECRET: "AsmMzWkjyrNvu5DprZWupQXy79mKFHK7d5Aj662YmVq4zEQns3RWb7NFpxvcTzgV"

  MAPMAKER_MAP_SERVICE_URL: "http://session-service.mapmaker.svc.cluster.local:9124"
  MAPMAKER_PLAYER_SERVICE_URL: "http://session-service.mapmaker.svc.cluster.local:9124"
  MAPMAKER_SESSION_SERVICE_URL: "http://session-service.mapmaker.svc.cluster.local:9124"
  MAPMAKER_PLAYER_INVITE_SERVICE_URL: "http://session-service.mapmaker.svc.cluster.local:9124"

  MAPMAKER_NATS_SERVERS: "nats://nats:4222"

  MAPMAKER_UNLEASH_ENABLED: "false"
  MAPMAKER_UNLEASH_USE_POSTHOG: "true"
  MAPMAKER_UNLEASH_POSTHOG_PROJECT_API_KEY: "${POSTHOG_PROJECT_API_KEY}"
  MAPMAKER_UNLEASH_POSTHOG_PERSONAL_API_KEY: "${POSTHOG_PERSONAL_API_KEY}"

  MAPMAKER_SPAWN_MAP_ID: "b210fa07-d64c-4100-a2db-1426c35b7533"

replicaCount: 1
