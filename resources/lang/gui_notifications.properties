###
### GUI - Notifications
###

gui.notification.toast=<$yellow>New Notification!</$yellow>
gui.notifications.information.name=<$yellow>Information</$yellow>
gui.notifications.information.lore=\
    <$light_gray>A list of notifications that you have received.</$light_gray>\n\
    <$light_gray>Hover over a notification to see more details.</$light_gray>
gui.notification.unread.name=Mark as Unread
gui.notification.unread.lore=\
    <$light_gray>Mark this notification as unread.</$light_gray>\n\n\
    $LMB <$light_gray>Click to Mark as Unread</$light_gray>

gui.notification.unhandled.name=<$red>Unknown Notification</$red>
gui.notification.unhandled.lore=\
    <$light_gray>This notification was not recognized, this may be due</$light_gray>\n\
    <$light_gray>to being on an outdated server. If this presists after changing</$light_gray>\n\
    <$light_gray>servers, please contact support.</$light_gray>
gui.notification.unhandled.message=\
  <hover:show_text:'Click to Copy ID'><click:copy_to_clipboard:'<0>'>\
  <$light_gray>Notification ID: <$white><0></$white><$light_gray>\
  </click></hover>

gui.notifications.notification.lore.actions=$SHIFT_LMB <$white_gray>Click to Show Extended View</$white_gray>
gui.notifications.notification.lore.rmb=$RMB <0>
gui.notifications.notification.lore.lmb=$LMB <0>

###
### Notification Actions Menu Header
###
gui.notification.information.name=<$yellow>Information</$yellow>
gui.notification.information.lore=\
    <$light_gray>A group of actions you can take on this notification.</$light_gray>\n\
    <$light_gray>Hover over an action to see more details.</$light_gray>

gui.notification.time.name=<$azure>Delivered Time</$azure>
gui.notification.time.sent_at=<$light_gray>Sent </$light_gray><$white><0></$white>
gui.notification.time.read_at=<$light_gray>Read </$light_gray><$white><0></$white>
gui.notification.time.expires_at=<$light_gray>Expires in </$light_gray><$white><0></$white>

###
### Notification Actions
###

