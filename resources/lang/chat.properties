# Chat-Related
# 0: The player you are sending a message to or a receiving a message from
# 1: The message being sent
chat.msg.send=<$light_blue>You</$light_blue> <$dark_gray>-></$dark_gray> <0> <$dark_gray>ŧ</$dark_gray> <$white><1></$white>
chat.msg.receive=<0> <$dark_gray>-></$dark_gray> <$light_blue>You</$light_blue> <$dark_gray>ŧ</$dark_gray> <$white><1></$white>
chat.msg.no_text=$WARNING<$light_gray>You need a <$white>message</$white> to send!</$light_gray>
chat.msg.no_reply=$WARNING<$light_gray>You have <$white>nobody</$white> to reply to!</$light_gray>
chat.msg.cant_message_yourself=$DENY<$light_gray>You can only message other <$white>players</$white>!</$light_gray>
# 0: The chat channel the player is already in or switching to
chat.channel.already_in=$WARNING<$light_gray>You are already in <$white><0></$white>!</$light_gray>
chat.channel.changed=$CONFIRM <$light_gray>You are now talking in <$white><0></$white>.</$light_gray>
chat.channel.invalid=$DENY<$light_gray>That channel <$white>doesn't exist</$white>!</$light_gray>
# 0: The staff member sending a message in staff chat
chat.channel.staff=<$cyan>STAFF</$cyan> <0> <$dark_gray>ŧ</$dark_gray> <$white><1></$white>
# 0: Player username
# 1: Chat message
chat.channel.global.white=<0> <$dark_gray>ŧ</$dark_gray> <$white><1></$white>
chat.channel.global.default=<0> <$dark_gray>ŧ</$dark_gray> <$light_gray><1></$light_gray>

