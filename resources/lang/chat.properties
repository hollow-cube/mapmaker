chat.msg.cant_message_yourself=$DENY<$light_gray>You can only message other <$white>players</$white>!</$light_gray>
# 0: The chat channel the player is already in or switching to
chat.channel.already_in=$WARNING<$light_gray>You are already in <$white><0></$white>!</$light_gray>
chat.channel.changed=$CONFIRM<$light_gray>You are now talking in <$white><0></$white>.</$light_gray>
chat.channel.invalid=$DENY<$light_gray>That channel <$white>doesn't exist</$white>!</$light_gray>
# 0: Player username
# 1: Chat message
chat.channel.global=<0> <$dark_gray>»</$dark_gray> <$light_gray><1></$light_gray>
