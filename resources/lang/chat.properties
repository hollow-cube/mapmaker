chat.channel.staff=<hover:show_text:'Staff Chat'>$STAFF_CHANNEL</hover><0> <$dark_gray>»</$dark_gray> <$light_gray><1></$light_gray>
# DMs are all the same args
# 0: sender display name
# 1: receiver display name
# 2: message<0> <$dark_gray>-></$dark_gray> <1><$white_gray>:</$white_gray> <2>
