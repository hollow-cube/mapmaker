# Chat-Related
# 0: The player you are sending a message to or a receiving a message from
# 1: The message being sent
chat.msg.send=<$white_gray>You</$light_blue> <$white_gray>-></$dark_gray> <0> <$dark_gray>»</$dark_gray> <$white><1></$white>
chat.msg.receive=<0> <$dark_gray>-></$dark_gray> <$white_gray>You</$white_gray> <$dark_gray>»</$dark_gray> <$white><1></$white>
chat.msg.no_text=$WARNING<$light_gray>You need a <$white>message</$white> to send!</$light_gray>
