# /block
command.block.self=$DENY<$light_gray>You can't block <$white>yourself</$white>!</$light_gray>
# 0: Player Name
command.block.success=$CONFIRM<$light_gray>You <$white>blocked <0></$white>! You will <$white>not see</$white> their <$white>private messages</$white> anymore.</$light_gray>
command.block.already_blocked=$INFO<$light_gray>You <$white>already blocked</$white> <0>!</$light_gray>
