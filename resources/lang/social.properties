# 0: Player Name
#command.block.list.line=<$dark_gray>» <click:run_command:'/unblock <0>'><hover:show_text:'<$lime>Click to unblock this player!'><$white><0></$white></hover></click> Seth's old message, could be removed
command.block.list.line=<$dark_gray>» <$white><0></$white> [ <click:run_command:'/unblock <0>'><hover:show_text:'<$lime>Click to unblock this player!'><$red>❌</$red></hover></click> ]
# <$dark_gray>»</$dark_gray> <$light_gray><hover:show_text:'<$lime>Click to unblock this player.</$lime>'><click:run_command:/unblock <0>'<white><0></$white>'</click></hover></$light_gray>
# /unblock
# this should probably be consistent with other commands as an argument, like /block remove. Can still have unblock as an alias though?
command.unblock.self=$DENY<$light_gray>You can't block <$white>yourself</$white>!</$light_gray>
command.unblock.success=$CONFIRM<$light_gray>You <$white>unblocked <0></$white>! You will <$white>see</$white> their <$white>private messages</$white> again.</$light_gray>
command.unblock.not_blocked=$INFO<$light_gray>You <$white>don't</$white> have <$white><0> blocked</$white>!</$light_gray>

