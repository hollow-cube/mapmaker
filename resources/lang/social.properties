# /friend add
# when someone sends a friend request, then the other sends it and they become friends automatically, there is no positive response sent back to the original person to indicate that they are now friends
command.friend.add.self=$DENY<$light_gray>You can't friend <$white>yourself</$white>!</$light_gray>
# 0: Target Username
command.friend.add.request_sent=$CONFIRM<$light_gray>You sent <$white><0></$white> a <$white>friend request</$white>!</$light_gray>
# added is when they were added as a friend
# idk did I write the below one correctly lol?
command.friend.add.added=$INFO<$light_gray>You are now friends with <$white><0></$white>!</$light_gray>
command.friend.add.already_friends=$DENY<$light_gray>You are <$white>already friends</$white> with <$white><0></$white>!</$light_gray>
command.friend.add.blocked_by_self=$DENY<$light_gray>You <$white>cannot</$white> send <$white><0></$white> a <$white>friend request</$white> as you have them <$white>blocked</$white>!</$light_gray>
#command.friend.add.blocked_by_target=Will go unused for now. Prob better to be arbitrary and just use the auto rejected message when someone is blocked
command.friend.add.already_requested=$DENY<$light_gray>You already have a <$white>pending friend request</$white> to <$white><0></$white>!</$light_gray>
command.friend.add.auto_rejected=$DENY<$light_gray>You cannot send friend requests to this player!</$light_gray>
# 0: Friend Limit (15 or 1000)
# 1: Sender's Current Friends Count / get rid of this and # 2 we don't really need to say them, surely?
# 2: Sender's Current Outgoing Friend Requests
command.friend.add.limit_reached.non_hypercube=$DENY<$light_gray>We <$white>couldn't send</$white> your </$white>friend request</$white> as you've reached the <$white>friend limit</$white> of <$white><0></$white>!</$light_gray>
command.friend.add.limit_reached.hypercube=$DENY<$light_gray>We <$white>couldn't send</$white> your </$white>friend request</$white> as you've reached the <$white>friend limit</$white> of <$white><0></$white>!</$light_gray>
# this should prob just be split into 2 keys so 1 can say friend limit of 15 buy hypercube to get more! and the other is when you have hypercube and says you have 1000 TODO this is now possible

# /friend remove
command.friend.remove.self=$DENY<$light_gray>You can't friend <$white>yourself</$white>!</$light_gray>
# 0: Target Username
command.friend.remove.success=$CONFIRM<$light_gray>You <$white>removed <0></$white> from your <$white>friends</$white> list!</$light_gray>
command.friend.remove.not_friends=$DENY<$light_gray>You <$white>can't remove <0></$white> from your <$white>friends list</$white> as they <$white>aren't on it</$white>!</$light_gray>

# /friend request list <incoming/outgoing>
command.friend.request.list.empty.incoming=$INFO<$light_gray>You don't have any <$white>incoming friend requests</$white>!</$light_gray>
command.friend.request.list.empty.outgoing=$INFO<$light_gray>You don't have any <$white>outgoing friend requests</$white>!</$light_gray>
command.friend.request.list.header.incoming=<$yellow>Incoming Friend Requests</$yellow> <$dark_gray>[<$light_gray><0></$light_gray>/<$light_gray><1></$light_gray>]</$dark_gray>
command.friend.request.list.header.outgoing=<$yellow>Outgoing Friend Requests</$yellow> <$dark_gray>[<$light_gray><0></$light_gray>/<$light_gray><1></$light_gray>]</$dark_gray>
# 0: Friend Username / should add timestamp maybe?
#command.friend.request.list.line.incoming=<$dark_gray>» <click:run_command:'/friend request remove <0>'><hover:show_text:'<$lime>Click to remove your friend request to this player!'><$white><0></$white></hover></click> Seth's old message, could be removed
command.friend.request.list.line.incoming=<$dark_gray>» <$white><0></$white> [ <hover:show_text:'<$lime>Click to accept'><click:run_command:'/friend add <0>'><$lime>✔</$lime></click></hover> | <hover:show_text:'<$red>Click to deny'><click:run_command:'/friend request remove <0>'><$red>❌</$red></click></hover> ]
#command.friend.request.list.line.outgoing=<$dark_gray>» <click:run_command:'/friend request remove <0>'><hover:show_text:'<$lime>Click to remove your friend request to this player!'><$white><0></$white></hover></click> Seth's odl message, could be removed
command.friend.request.list.line.outgoing=<$dark_gray>» <$white><0></$white> <click:run_command:'/friend request remove <0>'><hover:show_text:'<$red>Click to remove!'>[ <$red>❌</$red> ]</hover></click>

# /friend request remove - player removes a request bidirectionally (so either they sent, or they received)
command.friend.request.remove.self=$DENY<$light_gray>You can't remove a friend request to yourself.</$light_gray>
# 0: Target Username
command.friend.request.remove.success=$CONFIRM<$light_gray>You removed your friend request to <$white><0></$white>!</$light_gray>
command.friend.request.remove.not_requested=$DENY<$light_gray>You have no friend request to or from <$white><0></$white>!</$light_gray>

# /friend list
command.friend.list.empty=$INFO<$light_gray>You don't have any <$white>friends</$white> yet! Use <$white>/friend add <player></$white> to send a friend request.</$light_gray>
# 0: Page Number
# 1: Max Page Number/Page Count
command.friend.list.header=<$yellow>Friends List</$yellow> <$dark_gray>[<$light_gray><0></$light_gray>/<$light_gray><1></$light_gray>]</$dark_gray>
# 0: Friend Username
command.friend.list.line=<$dark_gray>» <$white><0></$white>

