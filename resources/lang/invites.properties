# Invite System
# 0: The player to check a build invite from
# 0: The player to check a build invite from
map.play.invite.sent=$INFO<$light_gray>You invited <$white><0></$white> to play on the map <$white><1></$white>.</$light_gray>
map.build.invite.sent=$INFO<$light_gray>You invited <$white><0></$white> to build on the map <$white><1></$white>.</$light_gray>
map.invite.no_permission=$DENY<$light_gray>You cannot invite <$white><0></$white> to build with you as you are not the Owner of the map <$white><1></$white>!</$light_gray>

map.play.invite.pending=<click:run_command:'/accept <2>'><hover:show_text:'<$lime>Click to accept!</$lime>'>$INFO<$light_gray>You were invited by <$white><0></$white> to play on the map <$white><1></$white>.</$light_gray> <$lime>Click here to accept!</$lime></click>
map.build.invite.pending=<click:run_command:'/accept <2>'><hover:show_text:'<$lime>Click to accept!</$lime>'>$INFO<$light_gray>You were invited by <$white><0></$white> to build on the map <$white><1></$white>.</$light_gray> <$lime>Click here to accept!</$lime></click>

map.play.invite.accept=$CONFIRM <$light_gray>You accepted <$white><0>'s</$white> invite to play on the map <$white><1></$white>.</$light_gray>
map.build.invite.accept=$CONFIRM <$light_gray>You accepted <$white><0>'s</$white> invite to build on the map <$white><1></$white>.</$light_gray>
map.play.invite.accepted=$CONFIRM <$light_gray>Your invite for <$white><0></$white> to play on the map <$white><1></$white> was accepted!</$light_gray>
map.build.invite.accepted=$CONFIRM <$light_gray>Your invite for <$white><0></$white> to build on the map <$white><1></$white> was accepted!</$light_gray>
map.play.invite.reject=$DENY<$light_gray>You denied <$white><0>'s</$white> invite to play on the map <$white><1></$white>.</$light_gray>
map.build.invite.reject=$DENY<$light_gray>You denied <$white><0>'s</$white> invite to build on the map <$white><1></$white>.</$light_gray>
map.play.invite.rejected=$DENY<$light_gray>Your invite for <$white><0></$white> to play with you on the map <$white><1></$white> was denied!</$light_gray>
map.build.invite.rejected=$DENY<$light_gray>Your invite for <$white><0></$white> to build with on the map <$white><1></$white> was denied!</$light_gray>
map.play.invite.timed_out=$WARNINGYour invite for <$white><0></$white> to play with you on the map <$white><1></$white> timed out!</$light_gray>
map.build.invite.timed_out=$WARNINGYour invite for <$white><0></$white> to build with you on the map <$white><1></$white> timed out!</$light_gray>
map.play.request.sent=$INFO<$light_gray>You have requested to join and play with <$white><0></$white> on the map <$white><1></$white>.</$light_gray>
map.build.request.sent=$INFO<$light_gray>You have requested to join and build with <$white><0></$white> on the map <$white><1></$white>.</$light_gray>

map.play.request.pending=<click:run_command:'/accept <2>'><hover:show_text:'<$lime>Click to accept!</$lime>'>$INFO<$light_gray><$white><0></$white> has requested to join you on the map <$white><1></$white>.</$light_gray> <$lime>Click here to accept!</$lime></click>
map.build.request.pending=<click:run_command:'/accept <2>'><hover:show_text:'<$lime>Click to accept!</$lime>'>$INFO<$light_gray><$white><0></$white> has requested to build with you on the map <$white><1></$white>.</$light_gray> <$lime>Click here to accept!</$lime></click>

map.build.request.cant_send=$DENY<$light_gray>You cannot request to join <$white><0></$white> as they are not the Owner or a Trusted Member of the map they are building in.</$light_gray>
map.play.request.cant_send=$DENY<$light_gray>You cannot request to join <$white><0></$white> as they are not in a map!</$light_gray>
map.play.request.accept=$CONFIRM <$light_gray>You accepted <$white><0>'s</$white> request to play with you on the map <$white><1></$white>.</$light_gray>
map.build.request.accept=$CONFIRM <$light_gray>You accepted <$white><0>'s</$white> request to build with you on the map <$white><1></$white>.</$light_gray>
map.play.request.accepted=$CONFIRM <$light_gray>Your request to play with <$white><0></$white> on the map <$white><1></$white> was accepted.</$light_gray>
map.build.request.accepted=$CONFIRM <$light_gray>Your request to build with <$white><0></$white> on the map <$white><1></$white> was accepted.</$light_gray>
map.play.request.reject=$DENY<$light_gray>You denied <$white><0>'s</$white> request to play with you on the map <$white><1></$white>.</$light_gray>
map.build.request.reject=$DENY<$light_gray>You denied <$white><0>'s</$white> request to build with you on the map <$white><1></$white>.</$light_gray>
map.play.request.rejected=$DENY<$light_gray>Your request to play with <$white><0></$white> on the map <$white><1></$white> was denied.</$light_gray>
map.build.request.rejected=$DENY<$light_gray>Your request to build with <$white><0></$white> on the map <$white><1></$white> was denied.</$light_gray>
map.invite_and_request.cant_send=$DENY<$light_gray>You cannot send invites or requests to <$white><0></$white> as they have them disabled!</$light_gray>
map.invite_and_request.cant_accept=$WARNING<$light_gray>You don't have any invites or requests to accept!</$light_gray>
map.invite_and_request.cant_reject=$WARNING<$light_gray>You don't have any invites or requests to reject!</$light_gray>
map.accept.none=$DENY<$light_gray>You don't have any requests or invites!</$light_gray>
map.invite.no_join=$DENY<$light_gray>You don't have a pending invite from <$white><0></$white>!</$light_gray>
map.invite.left_map=$WARNING<$light_gray>You can no longer accept <$white><0>'s</$white> invite as they left the map they were in!</$light_gray>
map.invite.expired=$WARNING<$light_gray>This invite has expired!</$light_gray>
map.invite.already_present=$WARNING<$light_gray>You already have a pending invite for <$white><0></$white>!</$light_gray>
map.request.expired=$WARNING<$light_gray>That request has expired!</$light_gray>
map.request.already_present=$WARNING<$light_gray>You already have a pending request for <$white><0></$white>!</$light_gray>
map.invite.no_map=$DENY<$light_gray>You must be in a map to invite a player!</$light_gray>
map.invite.same_map=$DENY<$light_gray>You cannot invite <$white><0></$white> as they are already in the same map as you!</$light_gray>
map.request.no_join=$DENY<$light_gray>You don't have a pending request from <$white><0></$white>!</$light_gray>
map.request.same_map=$DENY<$light_gray>You cannot request to join <$white><0></$white> as they are already in the same map as you!</$light_gray>
map.play.request.already_in_map=$INFO<$light_gray><$white><0></$white> person was already in a published map, so you were teleported to them.</$light_gray>
map.invite.invalidated=$WARNING<$light_gray>You left the map so your invite was invalidated!</$light_gray>
map.request.invalidated=$WARNING<$light_gray>The player you were requesting to join left the map they were in, so your request was invalidated!</$light_gray>
# START BARDY TRANSLATION KEYS
