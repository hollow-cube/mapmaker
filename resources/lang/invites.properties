# Start and end comments will be removed once translation keys are verified by Seth
map.invite.multiple=$DENY<$light_gray>You have multiple invites, please specify which one you want to accept!</$light_gray>
map.request.multiple=$DENY<$light_gray>You have multiple requests, please specify which one you want to accept!</$light_gray>
map.invite_and_request.both=$DENY<$light_gray>You have a distinct request and invite, please specify which player to accept from!</$light_gray>
map.invite.sender_left_map=$DENY<$light_gray>You cannot accept this invite as the sender has left the map!</$light_gray>
map.invite.sender_offline=$DENY<$light_gray>You cannot accept this invite as the sender is offline!</$light_gray>
map.request.target_left_map=$DENY<$light_gray>You cannot accept this request as the target has left the map!</$light_gray>
map.request.target_offline=$DENY<$light_gray>You cannot accept this request as the target is offline!</$light_gray>
# END BARDY TRANSLATION KEYS
map.build.removed=$DENY<$light_gray><$white><0></$white> removed you from building on their map!</$light_gray>
map.build.remove=$CONFIRM<$light_gray>You removed <$white><0></$white> from building in your map!</$light_gray>
map.build.cant_remove=$DENY<$light_gray>You must be the Owner of this map to remove an invited builder!</$light_gray>
map.build.remove.same_map=$DENY<$light_gray>You cannot remove <$white><0></$white> as they are not in your map!</$light_gray>
command.invite.usage=$INFO<$light_gray>Usage: <$white>/invite <player></$white> Invites a player to your current map. Note that doing this in build mode will grant them build permissions.</$light_gray>
command.request.usage=$INFO<$light_gray>Usage: <$white>/request <player></$white> Requests a player to let you join their current map.</$light_gray>
command.accept.usage=$INFO<$light_gray>Usage: <$white>/accept <player></$white> Accepts the most recent <$white>/invite</$white> or <$white>/request</$white> from a player.</$light_gray>
command.reject.usage=$INFO<$light_gray>Usage: <$white>/reject <player></$white> Rejects the most recent <$white>/invite</$white> or <$white>/request</$white> from a player.</$light_gray>
command.remove.usage=$INFO<$light_gray>Usage: <$white>/remove <player></$white> Removes a player that is building in your map.</$light_gray>