item.test.return_to_checkpoint.lore=Teleport back to your last activated Checkpoint.

item.test.set_checkpoint=Set Checkpoint $RMB_ITEM
item.test.set_checkpoint.lore=Set a temporary artificial checkpoint for practicing.

item.test.exit_testing_mode=Exit Testing Mode $RMB_ITEM
item.test.exit_testing_mode.lore=Return to building your map from where you entered Testing Mode.

item.test.finished_mode.reset=Reset Progress $RMB_ITEM
item.test.finished_mode.reset.lore=Return to where you entered Testing Mode.

