item.spectator.toggle_flight.on.lore=Toggle your flight status on.
item.spectator.toggle_flight.off=Flight ｻ Enabled $RMB_ITEM
item.spectator.toggle_flight.off.lore=Toggle your flight status off.



# Regular Play Finished Mode Hotbar
item.mapmaker.review_map.name=Review Map $RMB_ITEM
item.mapmaker.review_map.lore=Give a rating to the map.

item.finished.play_similar.name=Play Similar Map $RMB_ITEM
item.finished.play_similar.lore=Join a map similar in tags, difficulty, etc.



# Map Creator Hotbar
item.mapmaker.builder_menu.name=<$lime>Builder Menu</$lime> $RMB_ITEM
item.mapmaker.builder_menu.lore=\
  <$light_gray>Various tools, settings, and custom blocks</$light_gray>\n\
  <$light_gray>that can help you create and improve your map.</$light_gray>



# Map Creator Testing Mode Hotbar
item.mapmaker.set_testing_checkpoint.name=<$white>Set Checkpoint</$white> $RMB_ITEM
item.mapmaker.set_testing_checkpoint.lore=\
  <$light_gray>Set a temporary checkpoint for testing.</$light_gray>\n\n\
  $RMB <$white_gray>Click to Set</$white_gray>\n\
  $SHIFT_RMB <$white_gray>Shift + Click to Clear</$white_gray>

item.mapmaker.exit_test_mode.name=<$white>Leave Testing Mode</$white> $RMB_ITEM
item.mapmaker.exit_test_mode.lore=\
  <$light_gray>Exit testing mode and return to where you entered it from.</$light_gray>



